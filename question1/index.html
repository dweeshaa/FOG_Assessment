<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOG - Game Selection</title>
  <meta name="description" content="Choose your game from the FOG arcade collection. Swipe through cards and select your next adventure." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-particles" id="bgParticles"></div>
  <div class="bg-gradient"></div>

  <!-- Main Content -->
  <main class="main">
    <div class="section-title">
      <h1>Select Your Game</h1>
      <p class="subtitle">Swipe or use arrows to browse • Click a card to play</p>
    </div>

    <!-- Card Carousel -->
    <div class="carousel-container" id="carouselContainer">
      <button class="nav-arrow nav-prev" id="navPrev" aria-label="Previous game">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="carousel-track" id="carouselTrack">
        <!-- Cards will be injected by JS -->
      </div>

      <button class="nav-arrow nav-next" id="navNext" aria-label="Next game">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- Dots Indicator -->
    <div class="carousel-dots" id="carouselDots"></div>

    <!-- Game Info Panel -->
    <div class="game-info-panel" id="gameInfoPanel">
      <div class="game-info-content">
        <span class="game-tag" id="gameTag">ACTION</span>
        <h2 class="game-title" id="gameTitle">Laser Tag Arena</h2>
        <p class="game-desc" id="gameDesc">Battle in the ultimate neon arena</p>
        <button class="play-btn" id="playBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Play Now
        </button>
      </div>
    </div>
  </main>

  <!-- Video Modal -->
  <div class="video-modal" id="videoModal">
    <div class="video-modal-backdrop" id="videoModalBackdrop"></div>
    <div class="video-modal-content" id="videoModalContent">
      <button class="video-close-btn" id="videoCloseBtn" aria-label="Close video">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="video-wrapper">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
        <div class="video-overlay" id="videoOverlay">
          <div class="video-game-name" id="videoGameName">Laser Tag Arena</div>
          <div class="video-status">▶ Now Playing</div>
        </div>
      </div>
      <div class="video-controls">
        <div class="video-progress-bar" id="videoProgressBar">
          <div class="video-progress-fill" id="videoProgressFill"></div>
        </div>
        <div class="video-controls-row">
          <button class="video-ctrl-btn" id="videoPauseBtn" aria-label="Pause">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <span class="video-time" id="videoTime">0:00 / 0:30</span>
          <button class="video-ctrl-btn" id="videoFullscreenBtn" aria-label="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
